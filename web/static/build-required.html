<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>需要构建前端 · 闲鱼文案工坊</title>
  <style>
    :root {
      --accent: #ff6800;
      --ink: #1a1a1a;
      --muted: #71717a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans SC", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f4f5;
      color: var(--ink);
      padding: 24px;
    }
    .panel {
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      border: 1px solid #e4e4e7;
    }
    h1 { font-size: 1.35rem; margin-bottom: 12px; }
    p { line-height: 1.65; color: var(--muted); margin-bottom: 12px; }
    pre {
      background: #f4f4f5;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin: 16px 0;
      overflow-x: auto;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #f4f4f5; color: var(--ink); }
    #status { font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Vue 前端尚未构建</h1>
    <p>当前只能显示本提示页，所有工作台按钮需要构建后才能使用。</p>
    <pre><code>cd web/frontend
npm install
npm run build</code></pre>
    <p>或直接双击项目根目录的 <strong>start.bat</strong>（会自动构建并启动）。</p>
    <div class="actions">
      <button type="button" class="btn btn-primary" onclick="location.reload()">刷新页面</button>
      <a class="btn btn-secondary" href="/api/health" target="_blank">检查 API</a>
    </div>
    <p id="status"></p>
  </div>
  <script>
    fetch('/api/health').then(r => r.json()).then(d => {
      document.getElementById('status').textContent =
        d.ok ? '✓ 后端 API 正常，构建前端后即可使用完整界面' : '后端响应异常';
    }).catch(() => {
      document.getElementById('status').textContent =
        '✗ 无法连接后端，请先运行 start.bat 或 uvicorn';
    });
  </script>
</body>
</html>
