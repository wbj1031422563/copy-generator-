# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: copy-generator
    runtime: python
    plan: free
    branch: main
    buildCommand: chmod +x scripts/render_build.sh && ./scripts/render_build.sh
    startCommand: uvicorn web.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: COPYGEN_AUTH_USER
        sync: false
      - key: COPYGEN_AUTH_PASSWORD
        sync: false
      - key: COPYGEN_AUTH_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
